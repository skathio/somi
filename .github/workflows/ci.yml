# CI workflow — runs validation on every PR and push to main.
# Direct implementation: hashira-ops npm-package-ci has two external-consumer
# bugs (scan-suite D14 nested path, commitlint non-blocking exit) that can't
# be patched from the consumer side. Revisit once hashira fixes them.

name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq shellcheck

      - name: Run validation
        run: bash scripts/validate.sh
